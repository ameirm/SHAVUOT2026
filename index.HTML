<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ובאו כולם - ירמיהו 48</title>
    <style>
        :root { --primary-color: #1a2a6c; --accent-color: #b8922e; --bg-color: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 500px; border-top: 6px solid var(--accent-color); }
        h1 { color: var(--primary-color); text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--primary-color); }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .checkbox-group { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        .checkbox-item { display: flex; align-items: center; margin-bottom: 10px; cursor: pointer; font-weight: 500; }
        .checkbox-item input { margin-left: 10px; width: 18px; height: 18px; }
        button { width: 100%; padding: 15px; background-color: var(--primary-color); color: white; border: none; border-radius: 6px; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
        #summaryPage { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: right; }
        th { background-color: var(--primary-color); color: white; }
    </style>
</head>
<body>

<div class="card">
    <div id="registrationPage">
        <h1>ובאו כולם</h1>
        <div class="subtitle">רישום לסעודות - ירמיהו 48</div>
        <form id="regForm">
            <div class="form-group">
                <label>שם מלא</label>
                <input type="text" id="name" required placeholder="שם ושם משפחה">
            </div>
            <div class="form-group">
                <label>מספר נפשות</label>
                <input type="number" id="guests" min="1" value="1" required>
            </div>
            <div class="form-group">
                <label>בחירת סעודות (ניתן לבחור כמה)</label>
                <div class="checkbox-group">
                    <label class="checkbox-item"><input type="checkbox" name="meal" value="סעודת הלילה - שבועות"> סעודת הלילה - שבועות</label>
                    <label class="checkbox-item"><input type="checkbox" name="meal" value="סעודת היום - שבועות"> סעודת היום - שבועות</label>
                    <label class="checkbox-item"><input type="checkbox" name="meal" value="סעודת ליל שבק"> סעודת ליל שב"ק</label>
                    <label class="checkbox-item"><input type="checkbox" name="meal" value="סעודת יום שבק"> סעודת יום שב"ק</label>
                </div>
            </div>
            <button type="submit" id="submitBtn">אישור והרשמה</button>
        </form>
    </div>

    <div id="summaryPage">
        <h1>רשימת נרשמים</h1>
        <div id="summaryTableContainer"></div>
        <button onclick="location.reload()" style="margin-top:20px; background:var(--accent-color);">חזרה להרשמה</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz9CZKlrcVETyY1LpUfKuATIBYUSbY-KSDZH-CTWHezc0a2p5ZrLRbK5KDtAxAGa5kv/exec';

    document.getElementById('regForm').addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const selectedMeals = Array.from(document.querySelectorAll('input[name="meal"]:checked')).map(el => el.value);
        
        if (selectedMeals.length === 0) return alert("בחר לפחות סעודה אחת.");
        
        btn.disabled = true;
        btn.innerText = 'שולח...';

        const data = {
            name: document.getElementById('name').value,
            guests: document.getElementById('guests').value,
            meals: selectedMeals
        };

        fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) })
        .then(res => res.json())
        .then(summaryData => {
            document.getElementById('registrationPage').style.display = 'none';
            document.getElementById('summaryPage').style.display = 'block';
            let html = '<table><tr><th>שם</th><th>נפשות</th><th>סעודה</th></tr>';
            summaryData.forEach(row => {
                html += `<tr><td>${row.name}</td><td>${row.guests}</td><td>${row.meal}</td></tr>`;
            });
            document.getElementById('summaryTableContainer').innerHTML = html + '</table>';
        })
        .catch(() => alert('ההרשמה בוצעה! רענן את הדף לצפייה ברשימה.'));
    });
</script>
</body>
</html>
